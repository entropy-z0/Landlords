name: Code Quality

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
    
jobs:
  code-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qtbase5-dev qtchooser qt5-qmake qtbase5-dev-tools qtmultimedia5-dev cppcheck clang-format
    
    - name: Static analysis with cppcheck
      run: |
        cppcheck --language=c++ --std=c++11 \
          --enable=warning,performance,portability \
          --suppress=missingIncludeSystem \
          --suppress=unknownMacro \
          --suppress=unusedFunction \
          --suppress=shadowFunction \
          --error-exitcode=1 \
          $(find . \( -name "*.cpp" -o -name "*.h" \) | grep -v build)
    
    - name: Code formatting check
      run: |
        find . \( -name "*.cpp" -o -name "*.h" \) | grep -v build | while read file; do
          clang-format -i "$file"
        done
        git diff --exit-code || exit 1